{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cadence Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <div class="login-box">
    <div class="title-bar">CADENCE</div>

    {% if messages %}
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <!-- LOGIN FORM -->
    <form id="login-form" method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="hidden" name="form_type" value="login">
      <h3>Login</h3>
      <input name="username" type="text" placeholder="Username" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">LOGIN</button>
      <p class="switch">No account? <a href="#" id="go-signup">Sign up</a></p>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" method="POST" action="{% url 'login' %}" style="display:none;">
      {% csrf_token %}
      <input type="hidden" name="form_type" value="signup">
      <h3>Sign Up</h3>
      <input name="username" type="text" placeholder="Username" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">CREATE ACCOUNT</button>
      <p class="switch">Already have one? <a href="#" id="go-login">Login</a></p>
    </form>

  </div>

  <script>
    document.getElementById("go-signup").addEventListener("click", function(e) {
      e.preventDefault();
      document.getElementById("login-form").style.display = "none";
      document.getElementById("signup-form").style.display = "block";
    });

    document.getElementById("go-login").addEventListener("click", function(e) {
      e.preventDefault();
      document.getElementById("signup-form").style.display = "none";
      document.getElementById("login-form").style.display = "block";
    });
  </script>

</body>
</html>
