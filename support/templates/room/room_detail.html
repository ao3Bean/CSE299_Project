{% extends "user_base.html" %}

{% block title %}{{ room.name }} - Cadence{% endblock %}

{% block content %}
<div class="dashboard-container">
  <div class="card">
    <h2>{{ room.name }}</h2>
    <p><b>Type:</b> {{ room.room_type }}</p>
    <p><b>Expires at:</b> {{ room.expires_at }}</p>
    <p><b>Room ID:</b> {{ room.room_id }}</p>
  </div>
</div>
{% endblock %}
