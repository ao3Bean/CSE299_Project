{% extends "user_base.html" %}
{% load static %}
{% block title %}Rooms - Cadence{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/rooms.css' %}">{% endblock %}
{% block nav_rooms %} active {% endblock %}
{% block content %}

<div class="dashboard-container">

  <!-- Search Bar -->
    <div class="rooms-search-wrap">
        <input
            type="text"
            class="rooms-search"
            placeholder="🔍  Search your saved spaces..."
        />
    </div>

  <!-- Main Card Container -->
    <div class="card rooms-panel">
        <h2 class="rooms-panel-title">Saved Spaces</h2>
    <div class="rooms-grid"> 

        <!-- Create Room Button -->
        <!-- will link later to different page -->
       <a href="#" class="dash-card rooms-create-card"> 
            <div class="rooms-create-icon">＋</div>
        </a>

        <!-- Room Cards — will replace with DTL loop laterrr endwhile similar to php-->
    <!-- {% for room in rooms %}
        
        {% empty %}
   
  {% endfor %} -->
    </div>

    <!-- Pagination 
     ?page={{ page_obj.previous_page_number }} and 
     ?page={{ page_obj.next_page_number }} smth similar when we do backend-->
    <div class="rooms-pagination">
        <button class="rooms-page-btn" aria-label="Previous">&larr;</button>
            <span class="rooms-page-indicator">
            <span class="rooms-page-dot rooms-page-dot--active"></span>
            <span class="rooms-page-dot"></span>
            <span class="rooms-page-dot"></span>
            </span>
        <button class="rooms-page-btn" aria-label="Next">&rarr;</button>
    </div>

  </div>
</div>

{% endblock %}
