{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Settings – Cadence</title>
    <link href="{% static 'css/user_base.css' %}" rel="stylesheet">
    <link href="{% static 'css/avatar.css' %}" rel="stylesheet">
</head>
<body>

    <!-- Back Button: top-left, routes based on auth status -->
    <a href="{% if user.is_authenticated %}{% url 'user_dashboard' %}{% else %}{% url 'index' %}{% endif %}"
       class="back-btn" aria-label="Go back">&#171;</a>

    <!-- Page Title Pill -->
    <div class="avatar-title-wrap">
        <h1 class="avatar-title-pill">Your Cadence Avatar</h1>
    </div>

    <!-- Main Card -->
    <div class="avatar-main-card card">

        <div class="avatar-inner-grid">

            <!-- LEFT: Avatar Preview -->
            <div class="avatar-preview-box">
                    <!-- TODO: Uncomment layers when image assets are ready -->
                <div class="avatar-canvas">    
                    <img src="{% static 'img/avatars/skin/skin_1.png' %}"      class="avatar-layer" id="layer-skin"      data-layer="skin">
                    <!-- <img src="{% static 'images/avatar/skin/default.png' %}"      class="avatar-layer" id="layer-skin"      data-layer="skin"> -->
                    <img src="{% static 'img/avatars/outfit/outfit_1.png' %}"    class="avatar-layer" id="layer-outfit"    data-layer="outfit">
                    <img src="{% static 'img/avatars/hair/hair_5.png' %}"      class="avatar-layer" id="layer-hair"      data-layer="hair">
                    <img src="{% static 'img/avatars/face/face_3.png' %}"      class="avatar-layer" id="layer-face"      data-layer="face">
                    <!-- <img src="{% static 'images/avatar/accessory/default.png' %}" class="avatar-layer" id="layer-accessory" data-layer="accessory"> -->
                   
                </div>
            </div>

            <!-- RIGHT: Customisation -->
            <div class="avatar-customise-box">

                <!-- Tab Buttons -->
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="skin">
                        <span class="tab-icon">👤</span>
                        <span class="tab-label">Skin</span>
                    </button>
                    <button class="tab-btn" data-tab="hair">
                        <span class="tab-icon">💇</span>
                        <span class="tab-label">Hair</span>
                    </button>
                    <button class="tab-btn" data-tab="face">
                        <span class="tab-icon"></span>
                        <span class="tab-label">face</span>
                    </button>
                    <button class="tab-btn" data-tab="outfit">
                        <span class="tab-icon">👕</span>
                        <span class="tab-label">Outfit</span>
                    </button>
                    <button class="tab-btn" data-tab="accessory">
                        <span class="tab-icon">✨</span>
                        <span class="tab-label">Extras</span>
                    </button>
                </div>

                <!-- Tab Panels -->
                <div class="tab-panels">

                    <!-- Skin -->
                    <div class="tab-panel active" id="panel-skin" data-panel="skin">
                        <p class="panel-title">Skin Tone</p>
                        <div class="item-grid color-grid">
                            <!-- TODO: Populate from backend -->
                            <button class="item-btn color-btn selected" data-item="skin-1" data-src="#" style="background:#FFDFC4;"></button>
                            <button class="item-btn color-btn"          data-item="skin-2" data-src="#" style="background:#F0C8A0;"></button>
                            <button class="item-btn color-btn"          data-item="skin-3" data-src="#" style="background:#D4A574;"></button>
                            <button class="item-btn color-btn"          data-item="skin-4" data-src="#" style="background:#A67C52;"></button>
                            <button class="item-btn color-btn"          data-item="skin-5" data-src="#" style="background:#8B5A2B;"></button>
                            <button class="item-btn color-btn"          data-item="skin-6" data-src="#" style="background:#5C4033;"></button>
                        </div>
                    </div>

                    <!-- Hair -->
                    <div class="tab-panel" id="panel-hair" data-panel="hair">
                        <p class="panel-title">Hairstyle</p>
                        <div class="item-grid">
                            <!-- TODO: Populate from backend -->
                            <button class="item-btn image-btn selected" data-item="hair-1"    data-src="#"><img src="#" alt="Hair 1"></button>
                            <button class="item-btn image-btn"          data-item="hair-2"    data-src="#"><img src="#" alt="Hair 2"></button>
                            <button class="item-btn image-btn"          data-item="hair-3"    data-src="#"><img src="#" alt="Hair 3"></button>
                            <button class="item-btn image-btn"          data-item="hair-4"    data-src="#"><img src="#" alt="Hair 4"></button>
                            <button class="item-btn image-btn"          data-item="hair-none" data-src=""><span class="none-icon">🚫</span></button>
                        </div>
                        
                    </div>

                    <!-- face -->
                    <div class="tab-panel" id="panel-face" data-panel="face">
                        <p class="panel-title">Eye Style</p>
                        <div class="item-grid">
                            <!-- TODO: Populate from backend -->
                            <button class="item-btn image-btn selected" data-item="face-1" data-src="#"><img src="#" alt="face 1"></button>
                            <button class="item-btn image-btn"          data-item="face-2" data-src="#"><img src="#" alt="face 2"></button>
                            <button class="item-btn image-btn"          data-item="face-3" data-src="#"><img src="#" alt="face 3"></button>
                        </div>
                    </div>

                    <!-- Outfit -->
                    <div class="tab-panel" id="panel-outfit" data-panel="outfit">
                        <p class="panel-title">Outfit</p>
                        <div class="item-grid">
                            <!-- TODO: Populate from backend -->
                            <button class="item-btn image-btn selected" data-item="outfit-1" data-src="#"><img src="#" alt="Outfit 1"></button>
                            <button class="item-btn image-btn"          data-item="outfit-2" data-src="#"><img src="#" alt="Outfit 2"></button>
                            <button class="item-btn image-btn"          data-item="outfit-3" data-src="#"><img src="#" alt="Outfit 3"></button>
                            <button class="item-btn image-btn"          data-item="outfit-4" data-src="#"><img src="#" alt="Outfit 4"></button>
                        </div>
                    </div>

                    <!-- Accessories -->
                    <div class="tab-panel" id="panel-accessory" data-panel="accessory">
                        <p class="panel-title">Accessories</p>
                        <div class="item-grid">
                            <!-- TODO: Populate from backend -->
                            <button class="item-btn image-btn"          data-item="acc-none" data-src=""><span class="none-icon">🚫</span></button>
                            <button class="item-btn image-btn selected" data-item="acc-1"    data-src="#"><img src="#" alt="Glasses"></button>
                            <button class="item-btn image-btn"          data-item="acc-2"    data-src="#"><img src="#" alt="Headphones"></button>
                            <button class="item-btn image-btn"          data-item="acc-3"    data-src="#"><img src="#" alt="Hat"></button>
                        </div>
                    </div>

                </div><!-- /tab-panels -->

            </div><!-- /avatar-customise-box -->

        </div><!-- /avatar-inner-grid -->

        <!-- Bottom Actions -->
        <div class="avatar-actions">
            <button class="btn btn-primary"   id="btn-save">Confirm</button>
            <button class="btn btn-secondary" id="btn-randomize">Reset</button>
        </div>

    </div><!-- /avatar-main-card -->

    <script src="{% static 'js/avatar.js' %}"></script>
</body>
</html>
